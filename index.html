<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness Bracket Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #ff6600;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --border: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-layout {
            display: flex;
            gap: 20px;
            width: 100%;
            align-items: flex-start;
        }

        /* Team Sidebar */
        #team-pool {
            width: 200px;
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            height: 90vh;
            overflow-y: auto;
            border: 2px solid var(--border);
            position: sticky;
            top: 20px;
        }

        .team-card {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            margin-bottom: 8px;
            cursor: grab;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* Bracket Grid */
        #bracket-container {
            display: flex;
            flex-grow: 1;
            justify-content: space-between;
            overflow-x: auto;
            padding: 20px;
            background: #181818;
            border-radius: 10px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            min-width: 160px;
        }

        .round-title {
            text-align: center;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .slot {
            width: 140px;
            height: 35px;
            background: #2a2a2a;
            border: 1px dashed #555;
            margin: 5px auto;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        /* Championship Highlight */
        .champion-slot {
            border: 2px solid var(--primary);
            height: 50px;
            background: #333;
        }

        #submit-section {
            margin: 40px 0;
            text-align: center;
        }

        button {
            padding: 15px 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        button:disabled { background: #444; cursor: not-allowed; }
        .error { color: #ff4444; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>2026 Bracket Challenge</h1>
    <p>Deadline: Monday, March 23rd</p>

    <div class="main-layout">
        <div id="team-pool">
            <div class="round-title">Available Teams</div>
            <div class="team-card">Team 1</div>
            <div class="team-card">Team 2</div>
            </div>

        <div id="bracket-container">
            <div class="round" id="r1">
                <div class="round-title">Round 1</div>
                </div>

            <div class="round" id="r2">
                <div class="round-title">Round 2</div>
            </div>

            <div class="round" id="r3">
                <div class="round-title">Sweet 16</div>
            </div>

            <div class="round" id="r4">
                <div class="round-title">Elite 8</div>
            </div>

            <div class="round" id="r5">
                <div class="round-title">Final Four</div>
            </div>

            <div class="round" id="r6">
                <div class="round-title">Champion</div>
                <div class="slot champion-slot" data-id="CHAMPION"></div>
            </div>
        </div>
    </div>

    <div id="submit-section">
        <button id="submitBtn" onclick="submitBracket()">Email My Bracket</button>
        <div id="msg" class="error"></div>
    </div>

    <script>
        // Initialize EmailJS
        (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

        // Helper to generate slots
        function createSlots(containerId, count, prefix) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = 'slot';
                div.setAttribute('data-id', `${prefix}-${i}`);
                container.appendChild(div);
            }
        }

        // Build the structure
        createSlots('r1', 32, 'R1');
        createSlots('r2', 16, 'R2');
        createSlots('r3', 8, 'S16');
        createSlots('r4', 4, 'E8');
        createSlots('r5', 2, 'F4');

        // Setup Drag and Drop
        const allSlots = document.querySelectorAll('.slot');
        const pool = document.getElementById('team-pool');

        new Sortable(pool, { group: 'bracket', animation: 150 });

        allSlots.forEach(slot => {
            new Sortable(slot, {
                group: 'bracket',
                animation: 150,
                onAdd: (evt) => {
                    if (evt.to.children.length > 1) {
                        pool.appendChild(evt.item);
                    }
                }
            });
        });

        function checkDeadline() {
            const now = new Date();
            const deadline = new Date('March 23, 2026 00:00:00');
            if (now >= deadline) {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('msg').innerText = "Deadline passed!";
                return false;
            }
            return true;
        }

        function submitBracket() {
            if (!checkDeadline()) return;

            const slots = document.querySelectorAll('.slot');
            const empty = Array.from(slots).find(s => s.children.length === 0);

            if (empty) {
                document.getElementById('msg').innerText = "Finish the bracket first!";
                return;
            }

            let results = "User Bracket Selection:\n\n";
            slots.forEach(s => {
                results += `${s.getAttribute('data-id')}: ${s.innerText.trim()}\n`;
            });

            emailjs.send("service_n35ji9e", "template_vvxqygc", {
                message: results,
                to_email: "burgerman0316@gmail.com"
            }).then(() => alert("Submitted!"), (err) => alert("Error: " + err));
        }

        checkDeadline();
    </script>
</body>
</html>
