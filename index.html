<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>March Madness 2026 - 68 Teams</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --slot-bg: #1a1a1a;
            --text: #FFFFFF;
            --accent: #FFFFFF;
            --line-color: #444;
            --slot-width: 110px;
            --slot-height: 26px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 130px; /* Space for the fixed team bar */
            overflow-x: auto;
        }

        /* FIXED TEAM POOL */
        #team-pool {
            position: fixed; top: 0; left: 0; width: 100%; height: 110px;
            background: var(--card); display: flex; flex-direction: row;
            overflow-x: auto; padding: 10px; gap: 10px;
            border-bottom: 2px solid var(--accent); z-index: 1000; align-items: center;
        }

        .team-card {
            min-width: 100px; padding: 8px; background: var(--accent);
            color: var(--bg); cursor: grab; border-radius: 4px;
            text-align: center; font-size: 10px; font-weight: bold; flex-shrink: 0;
            touch-action: none;
        }

        /* FIRST FOUR SECTION */
        .play-in-header { text-align: center; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 14px; }
        .play-in-container {
            display: flex; justify-content: center; gap: 15px; padding: 20px;
            border-bottom: 1px solid var(--line-color); margin-bottom: 30px;
        }
        .play-in-game { width: 120px; text-align: center; }
        .play-in-label { font-size: 8px; color: #888; margin-bottom: 4px; }

        /* MAIN BRACKET */
        .main-layout { display: flex; justify-content: center; min-width: 1500px; padding-bottom: 120px; }
        .bracket-side { display: flex; flex-direction: row; }
        .bracket-side.right { flex-direction: row-reverse; }
        .round { display: flex; flex-direction: column; width: var(--slot-width); }
        
        .round:not(.final) { margin-right: 35px; }
        .right .round:not(.final) { margin-right: 0; margin-left: 35px; }

        .slot-wrapper {
            display: flex; flex-direction: column; justify-content: center;
            flex-grow: 1; position: relative; min-height: 35px;
        }

        .slot {
            width: 100%; height: var(--slot-height); background: var(--slot-bg);
            border-bottom: 2px solid var(--accent); display: flex;
            align-items: center; justify-content: center; font-size: 9px;
            z-index: 2; color: var(--text);
        }

        .slot .team-card { background: transparent; color: var(--text); padding: 0; min-width: auto; }

        /* LINES */
        .left .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; right: -35px; width: 35px; border-right: 2px solid var(--line-color);
        }
        .left .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .left .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        .right .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; left: -35px; width: 35px; border-left: 2px solid var(--line-color);
        }
        .right .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .right .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        .center-court { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 160px; margin: 0 30px; }

        #submit-section {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            padding: 15px; text-align: center; border-top: 2px solid var(--accent); z-index: 1000;
        }
        button { padding: 12px 30px; background: var(--accent); color: var(--bg); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <!-- Team Pool: Populate with all 68 Teams -->
    <div id="team-pool">
        <div class="team-card">Duke</div>
        <div class="team-card">Kansas</div>
        <div class="team-card">Houston</div>
        <div class="team-card">UConn</div>
        <div class="team-card">Purdue</div>
        <div class="team-card">Alabama</div>
        <div class="team-card">Arizona</div>
        <div class="team-card">UNC</div>
        <!-- ... add the rest here ... -->
    </div>

    <div class="play-in-header">The First Four</div>
    <div class="play-in-container">
        <!-- Game 1 & 2 feed into Left Bracket, Game 3 & 4 into Right Bracket -->
        <div class="play-in-game">
            <div class="play-in-label">GAME 1</div>
            <div class="slot" data-id="FF1-A"></div>
            <div class="slot" data-id="FF1-B"></div>
        </div>
        <div class="play-in-game">
            <div class="play-in-label">GAME 2</div>
            <div class="slot" data-id="FF2-A"></div>
            <div class="slot" data-id="FF2-B"></div>
        </div>
        <div class="play-in-game">
            <div class="play-in-label">GAME 3</div>
            <div class="slot" data-id="FF3-A"></div>
            <div class="slot" data-id="FF3-B"></div>
        </div>
        <div class="play-in-game">
            <div class="play-in-label">GAME 4</div>
            <div class="slot" data-id="FF4-A"></div>
            <div class="slot" data-id="FF4-B"></div>
        </div>
    </div>

    <div class="main-layout">
        <!-- Left Side: 32 Teams (16 slots) -->
        <div class="bracket-side left">
            <div class="round" id="L1"></div>
            <div class="round" id="L2"></div>
            <div class="round" id="L3"></div>
            <div class="round" id="L4"></div>
            <div class="round final" id="L5"></div>
        </div>

        <div class="center-court">
            <span style="font-size: 10px; margin-bottom: 5px; letter-spacing: 1px;">NATIONAL CHAMPION</span>
            <div class="slot-wrapper" style="width: 100%;">
                <div class="slot" style="border: 2px solid var(--accent); height: 50px;" data-id="CHAMPION"></div>
            </div>
        </div>

        <!-- Right Side: 32 Teams (16 slots) -->
        <div class="bracket-side right">
            <div class="round" id="R1"></div>
            <div class="round" id="R2"></div>
            <div class="round" id="R3"></div>
            <div class="round" id="R4"></div>
            <div class="round final" id="R5"></div>
        </div>
    </div>

    <div id="submit-section">
        <button onclick="submitBracket()">Submit 68-Team Bracket</button>
        <p id="msg" style="color:#FF4444; font-size:10px; margin-top:5px;"></p>
    </div>

    <script>
        (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

        function createSide(prefix, roundsData) {
            roundsData.forEach(round => {
                const container = document.getElementById(prefix + round.num);
                for(let i=1; i<=round.count; i++) {
                    const wrap = document.createElement('div');
                    wrap.className = 'slot-wrapper';
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.setAttribute('data-id', `${prefix}${round.num}-${i}`);
                    wrap.appendChild(slot);
                    container.appendChild(wrap);
                }
            });
        }

        const bracketData = [
            {num: 1, count: 16}, // Round of 64 per side
            {num: 2, count: 8},
            {num: 3, count: 4},
            {num: 4, count: 2},
            {num: 5, count: 1}
        ];

        createSide('L', bracketData);
        createSide('R', bracketData);

        const pool = document.getElementById('team-pool');
        const dragConfig = {
            group: 'bracket', animation: 150, delay: 100, delayOnTouchOnly: true,
            onAdd: function(evt) { if (evt.to.children.length > 1) pool.appendChild(evt.item); }
        };

        new Sortable(pool, dragConfig);
        document.querySelectorAll('.slot').forEach(slot => { new Sortable(slot, dragConfig); });

        function submitBracket() {
            const slots = document.querySelectorAll('.slot');
            const filled = Array.from(slots).filter(s => s.children.length > 0);
            
            if (filled.length < slots.length) {
                document.getElementById('msg').innerText = "Finish filling all slots!";
                return;
            }

            let results = "March Madness 2026 - 68 Team Submission:\n\n";
            slots.forEach(s => {
                results += `${s.getAttribute('data-id')}: ${s.innerText.trim()}\n`;
            });

            emailjs.send("service_n35ji9e", "template_vvxqygc", {
                message: results,
                to_email: "burgerman9216@gmail.com"
            }).then(() => alert("Bracket successfully sent!"), (err) => alert("Error sending bracket."));
        }
    </script>
</body>
</html>
