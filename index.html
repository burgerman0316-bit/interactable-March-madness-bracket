<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness 2026 - Full Split Bracket</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #ff6600;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --line-color: #444;
            --slot-width: 120px;
            --slot-height: 28px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: auto;
        }

        /* Top Header */
        .header { text-align: center; padding: 10px; }

        .main-layout {
            display: flex;
            padding: 10px;
            justify-content: center;
            min-width: 1500px;
        }

        /* Sidebar for Teams */
        #team-pool {
            width: 160px;
            background: var(--card);
            padding: 10px;
            border-radius: 8px;
            height: 85vh;
            overflow-y: auto;
            border: 2px solid #333;
            position: sticky;
            top: 10px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .team-card {
            padding: 6px;
            background: var(--primary);
            margin-bottom: 4px;
            cursor: grab;
            border-radius: 4px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
        }

        /* Bracket Layout */
        .bracket-side { display: flex; flex-direction: row; }
        .bracket-side.right { flex-direction: row-reverse; }

        .round {
            display: flex;
            flex-direction: column;
            width: var(--slot-width);
        }

        /* Spacing for lines */
        .round:not(.final) { margin-right: 40px; }
        .right .round:not(.final) { margin-right: 0; margin-left: 40px; }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            position: relative;
            min-height: 40px;
        }

        .slot {
            width: 100%;
            height: var(--slot-height);
            background: #2a2a2a;
            border-bottom: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            z-index: 2;
        }

        /* CENTER CHAMPIONSHIP AREA */
        .center-court {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 200px;
            margin: 0 40px;
        }

        .champ-title { color: gold; font-weight: bold; margin-bottom: 10px; }

        /* LEFT SIDE LINES */
        .left .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; right: -40px; width: 40px;
            border-right: 2px solid var(--line-color);
        }
        .left .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .left .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        /* RIGHT SIDE LINES */
        .right .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; left: -40px; width: 40px;
            border-left: 2px solid var(--line-color);
        }
        .right .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .right .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        /* Submit Button Bar */
        #submit-section {
            position: fixed; bottom: 0; width: 100%; background: #121212;
            padding: 15px; text-align: center; border-top: 2px solid var(--primary); z-index: 100;
        }

        button { padding: 12px 40px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>March Madness 2026</h1>
    </div>

    <div class="main-layout">
        <!-- Sidebar -->
        <div id="team-pool">
            <p style="text-align: center; font-size: 11px;">TEAMS</p>
            <div class="team-card">Alabama</div>
            <div class="team-card">Houston</div>
            <div class="team-card">UConn</div>
            <div class="team-card">Purdue</div>
        </div>

        <!-- LEFT BRACKET (32 Teams -> 16 -> 8 -> 4 -> 2) -->
        <div class="bracket-side left">
            <div class="round" id="L1"></div>
            <div class="round" id="L2"></div>
            <div class="round" id="L3"></div>
            <div class="round" id="L4"></div>
            <div class="round final" id="L5"></div>
        </div>

        <!-- CENTER (National Champ) -->
        <div class="center-court">
            <div class="champ-title">CHAMPION</div>
            <div class="slot-wrapper" style="width: 100%;">
                <div class="slot" style="border: 2px solid gold; height: 50px;" data-id="CHAMPION"></div>
            </div>
        </div>

        <!-- RIGHT BRACKET (32 Teams -> 16 -> 8 -> 4 -> 2) -->
        <div class="bracket-side right">
            <div class="round" id="R1"></div>
            <div class="round" id="R2"></div>
            <div class="round" id="R3"></div>
            <div class="round" id="R4"></div>
            <div class="round final" id="R5"></div>
        </div>
    </div>

    <div id="submit-section">
        <button id="submitBtn" onclick="submitBracket()">Submit Results</button>
        <p id="msg" style="color:red; font-size:11px;"></p>
    </div>

    <script>
        (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

        function createSide(prefix, roundsData) {
            roundsData.forEach(round => {
                const container = document.getElementById(prefix + round.num);
                for(let i=1; i<=round.count; i++) {
                    const wrap = document.createElement('div');
                    wrap.className = 'slot-wrapper';
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.setAttribute('data-id', `${prefix}${round.num}-${i}`);
                    wrap.appendChild(slot);
                    container.appendChild(wrap);
                }
            });
        }

        const bracketData = [
            {num: 1, count: 16}, // 16 games per side = 32 total teams per side
            {num: 2, count: 8},
            {num: 3, count: 4},
            {num: 4, count: 2},
            {num: 5, count: 1}
        ];

        createSide('L', bracketData);
        createSide('R', bracketData);

        const allSlots = document.querySelectorAll('.slot');
        const pool = document.getElementById('team-pool');

        new Sortable(pool, { group: 'bracket', animation: 150 });
        allSlots.forEach(slot => {
            new Sortable(slot, {
                group: 'bracket',
                animation: 150,
                onAdd: (evt) => {
                    if (evt.to.children.length > 1) pool.appendChild(evt.item);
                }
            });
        });

        function submitBracket() {
            const slots = document.querySelectorAll('.slot');
            const filled = Array.from(slots).filter(s => s.children.length > 0);
            if (filled.length < slots.length) {
                document.getElementById('msg').innerText = "Bracket incomplete!";
                return;
            }

            let results = "March Madness 2026 Submission:\n\n";
            slots.forEach(s => results += `${s.getAttribute('data-id')}: ${s.innerText.trim()}\n`);

            emailjs.send("service_n35ji9e", "template_vvxqygc", {
                message: results,
                to_email: "burgerman9216@gmail.com"
            }).then(() => alert("Bracket sent!"), () => alert("Send failed"));
        }
    </script>
</body>
</html>
