<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #ff6600;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --line-color: #444;
            --slot-width: 140px;
            --slot-height: 32px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; padding: 20px; }

        .main-layout {
            display: flex;
            width: 98%;
            gap: 20px;
            padding-bottom: 100px;
        }

        #team-pool {
            width: 180px;
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            height: 85vh;
            overflow-y: auto;
            border: 2px solid #333;
            position: sticky;
            top: 20px;
        }

        .team-card {
            width: 100%;
            padding: 8px;
            background: var(--primary);
            margin-bottom: 6px;
            cursor: grab;
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
        }

        #bracket-container {
            display: grid;
            grid-template-columns: repeat(6, var(--slot-width));
            gap: 0 50px;
            flex-grow: 1;
            align-items: center;
        }

        .round {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-around;
        }

        .slot-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .slot {
            width: var(--slot-width);
            height: var(--slot-height);
            background: #2a2a2a;
            border-bottom: 2px solid var(--line-color);
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            z-index: 2;
        }

        /* Bracket Line Logic */
        .round:not(:last-child) .slot-wrapper::after {
            content: "";
            position: absolute;
            right: -50px;
            width: 50px;
            border-right: 2px solid var(--line-color);
            z-index: 1;
        }

        .round:not(:last-child) .slot-wrapper:nth-child(odd)::after {
            top: 50%;
            height: 50%; /* Reaches down */
            border-top: 2px solid var(--line-color);
        }

        .round:not(:last-child) .slot-wrapper:nth-child(even)::after {
            bottom: 50%;
            height: 50%; /* Reaches up */
            border-bottom: 2px solid var(--line-color);
        }

        .champion-slot {
            border: 2px solid var(--primary) !important;
            height: 50px;
        }

        #submit-section {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(18, 18, 18, 0.95);
            padding: 20px;
            text-align: center;
            border-top: 1px solid #333;
            z-index: 100;
        }

        button {
            padding: 15px 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button:disabled { background: #444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>March Madness Bracket 2026</h1>
        <p>Drag teams to complete the bracket before Monday!</p>
    </div>

    <div class="main-layout">
        <div id="team-pool">
            <h3 style="font-size: 14px; text-align: center;">Teams</h3>
            <!-- Add your 64 teams here -->
            <div class="team-card">Team 1</div>
            <div class="team-card">Team 2</div>
            <div class="team-card">Team 3</div>
        </div>

        <div id="bracket-container">
            <div class="round" id="r1"></div>
            <div class="round" id="r2"></div>
            <div class="round" id="r3"></div>
            <div class="round" id="r4"></div>
            <div class="round" id="r5"></div>
            <div class="round" id="r6">
                <div class="slot-wrapper">
                    <div class="slot champion-slot" data-id="CHAMPION"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="submit-section">
        <button id="submitBtn" onclick="submitBracket()">Submit Bracket</button>
        <div id="msg" style="color: #ff4444; font-size: 13px; margin-top: 8px;"></div>
    </div>

    <script>
        // Initializing with your Public Key from screenshot
        (function() { 
            emailjs.init("RsAYqiwym2mViUR8u"); 
        })();

        function createBracket(containerId, count, prefix) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'slot-wrapper';
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.setAttribute('data-id', `${prefix}-${i}`);
                wrapper.appendChild(slot);
                container.appendChild(wrapper);
            }
        }

        createBracket('r1', 32, 'RD1');
        createBracket('r2', 16, 'RD2');
        createBracket('r3', 8, 'S16');
        createBracket('r4', 4, 'E8');
        createBracket('r5', 2, 'F4');

        const allSlots = document.querySelectorAll('.slot');
        const pool = document.getElementById('team-pool');

        new Sortable(pool, { group: 'bracket', animation: 150 });

        allSlots.forEach(slot => {
            new Sortable(slot, {
                group: 'bracket',
                animation: 150,
                onAdd: (evt) => {
                    if (evt.to.children.length > 1) {
                        pool.appendChild(evt.item);
                    }
                }
            });
        });

        function checkDeadline() {
            const now = new Date();
            const deadline = new Date('March 23, 2026 00:00:00');
            if (now >= deadline) {
                document.getElementById('submitBtn').disabled = true;
                document.getElementById('msg').innerText = "Deadline has passed.";
                return false;
            }
            return true;
        }

        function submitBracket() {
            if (!checkDeadline()) return;

            const slots = document.querySelectorAll('.slot');
            const filled = Array.from(slots).filter(s => s.children.length > 0);

            if (filled.length < slots.length) {
                document.getElementById('msg').innerText = `Finish the bracket! ${slots.length - filled.length} spots left.`;
                return;
            }

            let results = "March Madness 2026 Bracket Selection:\n\n";
            slots.forEach(s => {
                results += `${s.getAttribute('data-id')}: ${s.innerText.trim()}\n`;
            });

            // Using your Service and Template IDs from screenshot
            emailjs.send("service_n35ji9e", "template_vvxqygc", {
                message: results,
                to_email: "burgerman9216@gmail.com"
            }).then(() => {
                alert("Success! Your bracket has been sent.");
            }, (err) => {
                alert("Email failed to send. Check your EmailJS dashboard.");
            });
        }

        checkDeadline();
    </script>
</body>
</html>
