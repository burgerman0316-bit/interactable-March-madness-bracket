<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March Madness Bracket Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #ff6600;
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--primary); }

        .container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        /* Teams Sidebar */
        #team-pool {
            width: 250px;
            background: var(--card);
            padding: 15px;
            border-radius: 8px;
            height: 80vh;
            overflow-y: auto;
            border: 2px solid #333;
        }

        /* Bracket Layout */
        #bracket {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .slot {
            width: 150px;
            height: 40px;
            background: #2a2a2a;
            border: 1px dashed #555;
            margin: 10px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: background 0.3s;
        }

        .team-card {
            width: 140px;
            padding: 8px;
            background: var(--primary);
            color: white;
            cursor: grab;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 11px;
            user-select: none;
        }

        #submit-section {
            margin-top: 30px;
            text-align: center;
        }

        button {
            padding: 15px 40px;
            font-size: 18px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .error-msg { color: #ff4444; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>2026 March Madness Bracket</h1>
    <div id="deadline-timer"></div>

    <div class="container">
        <div id="team-pool">
            <h3>Teams</h3>
            <div class="team-card">Alabama</div>
            <div class="team-card">Houston</div>
            <div class="team-card">Kansas</div>
            <div class="team-card">Purdue</div>
            <div class="team-card">UCLA</div>
            <div class="team-card">Texas</div>
            <div class="team-card">Arizona</div>
            <div class="team-card">UConn</div>
            <div class="team-card">Gonzaga</div>
            <div class="team-card">Duke</div>
            <div class="team-card">Kentucky</div>
            <div class="team-card">North Carolina</div>
            </div>

        <div id="bracket">
            <div class="round">
                <h3>Round 1</h3>
                <div class="slot" data-id="r1-1"></div>
                <div class="slot" data-id="r1-2"></div>
                <div class="slot" data-id="r1-3"></div>
                <div class="slot" data-id="r1-4"></div>
            </div>
            <div class="round">
                <h3>Sweet 16</h3>
                <div class="slot" data-id="r2-1"></div>
                <div class="slot" data-id="r2-2"></div>
            </div>
            <div class="round">
                <h3>Final Four</h3>
                <div class="slot" data-id="r3-1"></div>
            </div>
            <div class="round">
                <h3>Champion</h3>
                <div class="slot" data-id="champion"></div>
            </div>
        </div>
    </div>

    <div id="submit-section">
        <button id="submitBtn" onclick="submitBracket()">Submit Bracket</button>
        <p id="msg" class="error-msg"></p>
    </div>

    <script>
        // 1. INITIALIZE EMAILJS (Get your key at emailjs.com)
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY"); 
        })();

        // 2. SETUP DRAG AND DROP
        const slots = document.querySelectorAll('.slot');
        const pool = document.getElementById('team-pool');

        new Sortable(pool, {
            group: 'bracket',
            animation: 150
        });

        slots.forEach(slot => {
            new Sortable(slot, {
                group: 'bracket',
                animation: 150,
                onAdd: function (evt) {
                    // Only allow one team per slot
                    if (evt.to.children.length > 1) {
                        pool.appendChild(evt.item);
                    }
                }
            });
        });

        // 3. DEADLINE LOGIC (Monday, March 23, 2026)
        function checkDeadline() {
            const now = new Date();
            const deadline = new Date('March 23, 2026 00:00:00');
            const submitBtn = document.getElementById('submitBtn');
            const msg = document.getElementById('msg');

            if (now >= deadline) {
                submitBtn.disabled = true;
                msg.innerText = "The deadline has passed. Submissions are closed.";
                return false;
            }
            return true;
        }

        // 4. SUBMIT ACTION
        function submitBracket() {
            if (!checkDeadline()) return;

            const filledSlots = Array.from(slots).filter(s => s.children.length > 0);
            const msg = document.getElementById('msg');

            if (filledSlots.length < slots.length) {
                msg.innerText = "Please complete the entire bracket before submitting!";
                return;
            }

            // Gather the data
            let bracketData = "Bracket Results:\n";
            slots.forEach(s => {
                bracketData += `${s.getAttribute('data-id')}: ${s.innerText}\n`;
            });

            // Send via EmailJS
            emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                message: bracketData,
                to_email: "your-email@example.com"
            }).then(() => {
                alert("Bracket Submitted Successfully!");
            }, (err) => {
                alert("Failed to send: " + JSON.stringify(err));
            });
        }

        // Run deadline check on load
        checkDeadline();
    </script>
</body>
</html>
