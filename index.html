<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>March Madness 2026 - B&W Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;          /* Deep Black Background */
            --card: #121212;        /* Dark Grey for Containers */
            --slot-bg: #1a1a1a;     /* Slightly Lighter Grey for Empty Slots */
            --text-main: #FFFFFF;   /* Pure White Text */
            --accent: #FFFFFF;      /* White Accents/Slot Borders */
            --line-color: #444;     /* FIXED: Line color that is visible against black */
            --champ-accent: #FFFFFF;/* White Championship Border */
            
            --slot-width: 110px;
            --slot-height: 26px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-top: 120px; /* Space for the fixed team bar */
            overflow-x: auto;
        }

        h1 { color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; }

        /* FIXED TEAM BAR FOR MOBILE */
        #team-pool {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: var(--card);
            display: flex;
            flex-direction: row;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 10px;
            gap: 10px;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            white-space: nowrap;
            align-items: center;
        }

        .team-card {
            min-width: 100px;
            padding: 8px;
            background: var(--accent); /* White background for the card */
            color: var(--bg);          /* Black text on the card */
            cursor: grab;
            border-radius: 4px;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            flex-shrink: 0;
            touch-action: none; /* Crucial for mobile dragging */
            box-shadow: 0 2px 5px rgba(255,255,255,0.1);
        }

        .main-layout {
            display: flex;
            justify-content: center;
            min-width: 1400px; /* Keeps the bracket from collapsing horizontally */
            padding-bottom: 120px; /* Space for the submit bar */
        }

        .bracket-side { display: flex; flex-direction: row; }
        .bracket-side.right { flex-direction: row-reverse; }

        .round { display: flex; flex-direction: column; width: var(--slot-width); }
        .round:not(.final) { margin-right: 35px; }
        .right .round:not(.final) { margin-right: 0; margin-left: 35px; }

        .slot-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            position: relative;
            min-height: 35px;
        }

        .slot {
            width: 100%;
            height: var(--slot-height);
            background: var(--slot-bg);
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            z-index: 2;
            color: var(--text-main);
            transition: background 0.2s;
        }
        
        .slot .team-card {
            background: transparent;
            color: var(--text-main);
            padding: 0;
            margin: 0;
            font-weight: bold;
        }

        /* Connecting Lines Logic */
        .left .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; right: -35px; width: 35px;
            border-right: 2px solid var(--line-color);
        }
        .left .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .left .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        .right .round:not(.final) .slot-wrapper::after {
            content: ""; position: absolute; left: -35px; width: 35px;
            border-left: 2px solid var(--line-color);
        }
        .right .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .right .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        .center-court {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 160px;
            margin: 0 30px;
        }

        .champ-title {
            font-size: 10px; 
            color: var(--text-main); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
        }

        /* Submit Button Bar */
        #submit-section {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            padding: 15px; text-align: center; border-top: 2px solid var(--accent); z-index: 1000;
        }

        button { 
            padding: 12px 30px; 
            background: var(--accent); /* White button */
            color: var(--bg);          /* Black text */
            border: none; 
            border-radius: 20px; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer; 
        }

        button:disabled { background: #555; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="team-pool">
        <div class="team-card">Alabama</div>
        <div class="team-card">Houston</div>
        <div class="team-card">UConn</div>
        <div class="team-card">Purdue</div>
        <div class="team-card">Kansas</div>
        <div class="team-card">Arizona</div>
        <div class="team-card">Duke</div>
        <div class="team-card">UNC</div>
        </div>

    <div class="main-layout">
        <div class="bracket-side left">
            <div class="round" id="L1"></div>
            <div class="round" id="L2"></div>
            <div class="round" id="L3"></div>
            <div class="round" id="L4"></div>
            <div class="round final" id="L5"></div>
        </div>

        <div class="center-court">
            <span class="champ-title">NATIONAL CHAMPION</span>
            <div class="slot-wrapper" style="width: 100%;">
                <div class="slot" style="border: 2px solid var(--champ-accent); height: 45px;" data-id="CHAMPION"></div>
            </div>
        </div>

        <div class="bracket-side right">
            <div class="round" id="R1"></div>
            <div class="round" id="R2"></div>
            <div class="round" id="R3"></div>
            <div class="round" id="R4"></div>
            <div class="round final" id="R5"></div>
        </div>
    </div>

    <div id="submit-section">
        <button id="submitBtn" onclick="submitBracket()">Submit Bracket</button>
        <p id="msg" style="color:#FF4444; font-size:10px; margin: 5px 0 0 0;"></p>
    </div>

    <script>
        (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

        function createSide(prefix, roundsData) {
            roundsData.forEach(round => {
                const container = document.getElementById(prefix + round.num);
                for(let i=1; i<=round.count; i++) {
                    const wrap = document.createElement('div');
                    wrap.className = 'slot-wrapper';
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.setAttribute('data-id', `${prefix}${round.num}-${i}`);
                    wrap.appendChild(slot);
                    container.appendChild(wrap);
                }
            });
        }

        const bracketData = [
            {num: 1, count: 16}, // Round of 64 (per side)
            {num: 2, count: 8},  // Round of 32 (per side)
            {num: 3, count: 4},  // Sweet 16 (per side)
            {num: 4, count: 2},  // Elite 8 (per side)
            {num: 5, count: 1}   // Final Four (per side)
        ];

        createSide('L', bracketData);
        createSide('R', bracketData);

        const pool = document.getElementById('team-pool');
        
        const dragConfig = {
            group: 'bracket',
            animation: 150,
            delay: 100, // Touch delay for mobile
            delayOnTouchOnly: true,
            onAdd: function(evt) {
                if (evt.to.children.length > 1) pool.appendChild(evt.item); 
            }
        };

        new Sortable(pool, dragConfig);
        document.querySelectorAll('.slot').forEach(slot => {
            new Sortable(slot, dragConfig);
        });

        function submitBracket() {
            const slots = document.querySelectorAll('.slot');
            const filled = Array.from(slots).filter(s => s.children.length > 0);
            
            if (filled.length < slots.length) {
                document.getElementById('msg').innerText = "Finish filling all slots before submitting!";
                return;
            }

            let results = "March Madness 2026 Submission:\n\n";
            slots.forEach(s => results += `${s.getAttribute('data-id')}: ${s.innerText.trim()}\n`);

            emailjs.send("service_n35ji9e", "template_vvxqygc", {
                message: results,
                to_email: "burgerman0316@gmail.com"
            }).then(() => {
                alert("Success!");
                document.getElementById('submitBtn').disabled = true;
            }, (err) => {
                alert("Send failed.");
                console.log(err);
            });
        }
    </script>
</body>
</html>
