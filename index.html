<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>March Madness 2026 - Save PDF Fixed</title>
    
    <!-- LIBRARIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- PDF GENERATOR LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --slot-bg: #1a1a1a;
            --text: #FFFFFF;
            --accent: #FFFFFF;
            --line-color: #666;
            --slot-width: 110px;
            --slot-height: 26px;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-top: 110px;
            overflow: hidden; 
            height: 100vh;
            user-select: none;
        }

        /* TEAM POOL */
        #team-pool {
            position: fixed; top: 0; left: 0; width: 100%; height: 95px;
            background: var(--card); display: flex; flex-direction: row;
            overflow-x: auto; padding: 10px; gap: 10px;
            border-bottom: 2px solid var(--accent); z-index: 1001; align-items: center;
        }

        .team-card {
            min-width: 95px; padding: 8px; background: var(--accent);
            color: var(--bg); cursor: grab; border-radius: 4px;
            text-align: center; font-size: 10px; font-weight: bold; flex-shrink: 0;
            white-space: nowrap;
        }

        /* VIEWPORT */
        #bracket-viewport {
            width: 100%; height: calc(100vh - 180px);
            overflow: hidden; cursor: grab; position: relative;
        }

        #bracket-content {
            position: absolute; padding: 40px; min-width: 1700px;
            display: flex; flex-direction: column; align-items: center;
            background: #000; /* Ensure background isn't transparent for PDF */
        }

        .play-in-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .main-layout { display: flex; justify-content: center; }
        .bracket-side { display: flex; flex-direction: row; }
        .bracket-side.right { flex-direction: row-reverse; }
        .round { display: flex; flex-direction: column; width: var(--slot-width); }
        .round:not(.final) { margin-right: 35px; }
        .right .round:not(.final) { margin-right: 0; margin-left: 35px; }

        .slot-wrapper { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; position: relative; min-height: 35px; }
        .slot {
            width: 100%; height: var(--slot-height); background: var(--slot-bg);
            border-bottom: 2px solid var(--accent); display: flex;
            align-items: center; justify-content: center; font-size: 9px;
            color: var(--text);
        }

        /* BRACKET LINES */
        .left .round:not(.final) .slot-wrapper::after { content: ""; position: absolute; right: -35px; width: 35px; border-right: 2px solid var(--line-color); }
        .left .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .left .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }
        .right .round:not(.final) .slot-wrapper::after { content: ""; position: absolute; left: -35px; width: 35px; border-left: 2px solid var(--line-color); }
        .right .slot-wrapper:nth-child(odd)::after { top: 50%; height: 50%; border-top: 2px solid var(--line-color); }
        .right .slot-wrapper:nth-child(even)::after { bottom: 50%; height: 50%; border-bottom: 2px solid var(--line-color); }

        .center-court { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 150px; margin: 0 30px; }

        #submit-section {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            padding: 15px; text-align: center; border-top: 2px solid var(--accent); z-index: 1001;
            display: flex; justify-content: center; gap: 10px;
        }
        button { padding: 10px 20px; background: var(--accent); color: var(--bg); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

    <div id="team-pool">
        <div class="team-card">Duke (1)</div><div class="team-card">UConn (2)</div><div class="team-card">Michigan St (3)</div>
        <div class="team-card">Kansas (4)</div><div class="team-card">Florida (1)</div><div class="team-card">Arizona (1)</div>
        <div class="team-card">Purdue (2)</div><div class="team-card">Houston (2)</div><div class="team-card">UNC (6)</div>
        <div class="team-card">NC State</div><div class="team-card">Louisville (6)</div><div class="team-card">UCLA (7)</div>
    </div>

    <div id="bracket-viewport">
        <div id="bracket-content">
            <div class="play-in-container">
                <div class="slot" data-id="FF1-A"></div><div class="slot" data-id="FF1-B"></div>
                <div class="slot" data-id="FF2-A"></div><div class="slot" data-id="FF2-B"></div>
            </div>

            <div class="main-layout">
                <div class="bracket-side left">
                    <div class="round" id="L1"></div><div class="round" id="L2"></div><div class="round" id="L3"></div><div class="round" id="L4"></div><div class="round final" id="L5"></div>
                </div>
                <div class="center-court">
                    <div class="slot" style="height: 50px; width: 100%; border: 2px solid var(--accent);" data-id="CHAMPION"></div>
                    <span style="font-size: 10px; margin-top: 10px;">CHAMPION</span>
                </div>
                <div class="bracket-side right">
                    <div class="round" id="R1"></div><div class="round" id="R2"></div><div class="round" id="R3"></div><div class="round" id="R4"></div><div class="round final" id="R5"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="submit-section">
        <button onclick="submitBracket()">Submit Bracket</button>
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <script>
        (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

        const slider = document.getElementById('bracket-viewport');
        let isDown = false; let startX, startY, scrollLeft, scrollTop;

        slider.addEventListener('mousedown', (e) => {
            if (e.target.closest('.team-card')) return; 
            isDown = true;
            startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
            scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
        });
        slider.addEventListener('mouseup', () => isDown = false);
        slider.addEventListener('mouseleave', () => isDown = false);
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            slider.scrollLeft = scrollLeft - (e.pageX - slider.offsetLeft - startX);
            slider.scrollTop = scrollTop - (e.pageY - slider.offsetTop - startY);
        });

        function createSide(prefix, roundsData) {
            roundsData.forEach(round => {
                const container = document.getElementById(prefix + round.num);
                for(let i=1; i<=round.count; i++) {
                    const wrap = document.createElement('div'); wrap.className = 'slot-wrapper';
                    const slot = document.createElement('div'); slot.className = 'slot';
                    slot.setAttribute('data-id', `${prefix}${round.num}-${i}`);
                    wrap.appendChild(slot); container.appendChild(wrap);
                }
            });
        }
        createSide('L', [{num:1, count:16},{num:2, count:8},{num:3, count:4},{num:4, count:2},{num:5, count:1}]);
        createSide('R', [{num:1, count:16},{num:2, count:8},{num:3, count:4},{num:4, count:2},{num:5, count:1}]);

        new Sortable(document.getElementById('team-pool'), { group: 'bracket', animation: 150 });
        document.querySelectorAll('.slot').forEach(slot => {
            new Sortable(slot, { 
                group: 'bracket', animation: 150,
                onAdd: (evt) => { if (evt.to.children.length > 1) document.getElementById('team-pool').appendChild(evt.item); }
            });
        });

        // NEW PDF LOGIC
        function downloadPDF() {
            const element = document.getElementById('bracket-content');
            
            // Temporary fix for black background in PDF
            element.style.backgroundColor = "#000000";
            
            const opt = {
                margin:       0.2,
                filename:     'my-bracket-2026.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#000000', useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };

            // Reset scroll position so everything is captured
            slider.scrollTo(0,0);
            
            html2pdf().set(opt).from(element).save();
        }

        function submitBracket() {
            const slots = document.querySelectorAll('.slot');
            let res = "Bracket:\n";
            slots.forEach(s => { res += `${s.getAttribute('data-id')}: ${s.innerText.trim() || 'Empty'}\n`; });
            emailjs.send("service_n35ji9e", "template_vvxqygc", { message: res, to_email: "burgerman9216@gmail.com" })
            .then(() => alert("Sent!"), () => alert("Error."));
        }
    </script>
</body>
</html>
