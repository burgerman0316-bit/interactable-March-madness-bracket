<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>March Madness 2026 - Logic Enforced</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --bg: #000; --text: #FFF; --line: #FFF; --accent: #444; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; height: 100vh; user-select: none; }
        
        #team-pool {
            position: fixed; top: 0; left: 0; width: 100%; height: 62px;
            background: #111; display: flex; overflow-x: auto; padding: 10px; gap: 8px; 
            border-bottom: 2px solid var(--accent); z-index: 9999;
        }
        #team-pool::-webkit-scrollbar { height: 6px; }
        #team-pool::-webkit-scrollbar-track { background: #111; }
        #team-pool::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        .team-card {
            display: inline-flex; min-width: 95px; height: 30px; background: #fff; color: #000; 
            cursor: grab; border-radius: 4px; font-size: 10px; font-weight: bold; 
            align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid #999;
        }

        #bracket-viewport { width: 100vw; height: calc(100vh - 130px); margin-top: 62px; overflow: hidden; cursor: grab; }
        #bracket-content { position: absolute; width: 3200px; height: 1000px; transform-origin: 0 0; background: var(--bg); }
        .main-layout { display: flex; justify-content: center; padding: 60px; position: relative; width: 3000px; }
        .round { display: flex; flex-direction: column; width: 140px; justify-content: space-around; height: 800px; margin: 0 50px; z-index: 2; }

        .slot { 
            width: 100%; height: 26px; background: #111; border-bottom: 2px solid var(--line); 
            display: flex; align-items: center; padding: 0 5px; font-size: 10px; font-weight: bold; overflow: hidden;
        }

        #line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #submit-section { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; text-align: center; border-top: 2px solid #333; z-index: 9998; }
        button { padding: 8px 15px; background: #fff; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 0 5px; }
        #zoom-ui { position: fixed; bottom: 85px; right: 25px; z-index: 9999; background: #222; padding: 10px; border: 1px solid #fff; border-radius: 5px; }

        body.snap-mode { --bg: #fff; --text: #000; --line: #000; background: #fff !important; }
        body.snap-mode .slot { background: #eee !important; border-bottom: 2px solid #000 !important; color: #000; }
        body.snap-mode #team-pool, body.snap-mode #submit-section, body.snap-mode #zoom-ui { display: none !important; }
    </style>
</head>
<body>

<div id="team-pool">
    <script>
        const teams = ["Alabama","App St","Arizona","Arkansas","Auburn","Baylor","Boise St","Charleston","Clemson","Colo St","Colorado","Creighton","Dayton","Drake","Duke","Duquesne","FAU","Florida","Gonzaga","Grambling","Grand Canyon","Houston","Howard","Illinois","Indiana","Iowa St","Kansas","Kentucky","Longwood","Marquette","Maryland","McNeese","Memphis","Miami","Michigan St","Montana St","Morehead St","NC State","Norfolk St","Oakland","Oregon","Purdue","Samford","SDSU","St Johns","St Marys","St Peters","Stetson","TCU","Tennessee","Tex South","Texas","Texas A&M","UAB","UCLA","UConn","UNC","Utah St","Vermont","Villanova","Virginia","Wagner","Wash St","Wisconsin","WKU","Xavier","Yale"];
        teams.sort().forEach(t => document.write(`<div class="team-card">${t}</div>`));
    </script>
</div>

<div id="zoom-ui"><input type="range" id="zoom-slider" min="0.3" max="1.1" step="0.05" value="0.5"></div>

<div id="bracket-viewport">
    <div id="bracket-content">
        <div class="main-layout" id="capture-area">
            <svg id="line-svg"></svg>
            <div class="round" id="L1"></div><div class="round" id="L2"></div><div class="round" id="L3"></div><div class="round" id="L4"></div><div class="round" id="L5"></div>
            <div style="display:flex; flex-direction:column; justify-content:center; width:220px; margin:0 30px; text-align:center; z-index:2;">
                <div class="slot" id="CHAMPION" data-round="CHAMP" style="height:55px; border:3px solid var(--line); justify-content:center; font-size:16px;"></div>
                <h3 style="color:var(--text); margin-top:10px;">2026 WINNER</h3>
            </div>
            <div class="round" id="R5"></div><div class="round" id="R4"></div><div class="round" id="R3"></div><div class="round" id="R2"></div><div class="round" id="R1"></div>
        </div>
    </div>
</div>

<div id="submit-section">
    <button id="send-btn" onclick="sendBracket()">Submit Bracket</button>
    <button onclick="downloadPDF()">Download as a PDF</button>
</div>

<script>
    (function() { emailjs.init("RsAYqiwym2mViUR8u"); })();

    function build(id, count) {
        const r = document.getElementById(id);
        const roundNum = parseInt(id.slice(1));
        const side = id.charAt(0);
        for(let i=0; i<count; i++) {
            const s = document.createElement('div');
            s.className = 'slot';
            s.dataset.round = roundNum;
            s.dataset.side = side;
            s.dataset.index = i;
            s.ondblclick = function() { this.innerHTML = ''; };
            r.appendChild(s);
        }
    }
    [16,8,4,2,1].forEach((n,i) => build('L'+(i+1), n));
    [1,2,4,8,16].forEach((n,i) => build('R'+(5-i), n));

    new Sortable(document.getElementById('team-pool'), {
        group: { name: 'teams', pull: 'clone', put: false },
        sort: false, animation: 150
    });

    document.querySelectorAll('.slot').forEach(s => {
        new Sortable(s, {
            group: 'teams', animation: 150,
            onAdd: function(evt) {
                const team = evt.item.innerText;
                const r = parseInt(s.dataset.round) || 6; 
                const side = s.dataset.side || 'C';
                const idx = parseInt(s.dataset.index);

                // PARENT VALIDATION LOGIC
                if (r > 1 && side !== 'C') {
                    const prevRound = document.getElementById(side + (r - 1));
                    const p1 = prevRound.children[idx * 2].innerText;
                    const p2 = prevRound.children[idx * 2 + 1].innerText;
                    if (team !== p1 && team !== p2) {
                        alert("Logic Error: This team didn't play in the previous round's matchup!");
                        evt.item.remove(); return;
                    }
                } else if (side === 'C') { // Championship special check
                    const p1 = document.getElementById('L5').children[0].innerText;
                    const p2 = document.getElementById('R5').children[0].innerText;
                    if (team !== p1 && team !== p2) {
                        alert("Only the Finalists can be Champions!");
                        evt.item.remove(); return;
                    }
                }
                while (s.children.length > 1) { s.removeChild(s.firstChild); }
            }
        });
    });

    // Viewport & Pan/Zoom Logic
    const content = document.getElementById('bracket-content');
    const viewport = document.getElementById('bracket-viewport');
    const zoomS = document.getElementById('zoom-slider');
    let sc = 0.5, x = 0, y = 0, isP = false, sx, sy;

    const draw = () => { 
        const vw = viewport.clientWidth, vh = viewport.clientHeight;
        const cw = 3200 * sc, ch = 1000 * sc;
        if (x > 100) x = 100; if (x < vw - cw - 100) x = vw - cw - 100;
        if (y > 100) y = 100; if (y < vh - ch - 100) y = vh - ch - 100;
        content.style.transform = `translate(${x}px, ${y}px) scale(${sc})`; renderLines();
    };
    draw();

    zoomS.oninput = (e) => { sc = parseFloat(e.target.value); draw(); };
    viewport.onmousedown = (e) => { if(!e.target.closest('.slot') && !e.target.closest('.team-card')) { isP=true; sx=e.clientX-x; sy=e.clientY-y; } };
    window.onmousemove = (e) => { if(isP) { x=e.clientX-sx; y=e.clientY-sy; draw(); } };
    window.onmouseup = () => isP=false;

    function renderLines() {
        const svg = document.getElementById('line-svg'); svg.innerHTML = '';
        const color = document.body.classList.contains('snap-mode') ? "black" : "white";
        const drawSide = (r1, r2, side) => {
            const s1 = Array.from(document.getElementById(r1).children);
            const s2 = Array.from(document.getElementById(r2).children);
            s1.forEach((box, i) => {
                const target = s2[Math.floor(i/2)];
                const x1 = side === 'L' ? box.offsetLeft + box.offsetWidth : box.offsetLeft;
                const x2 = side === 'L' ? target.offsetLeft : target.offsetLeft + target.offsetWidth;
                const y1 = box.offsetTop + (box.offsetHeight / 2);
                const y2 = target.offsetTop + (target.offsetHeight / 2);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} H ${(x1+x2)/2} V ${y2} H ${x2}`);
                path.setAttribute("stroke", color); path.setAttribute("stroke-width", "2"); path.setAttribute("fill", "none");
                svg.appendChild(path);
            });
        };
        [['L1','L2'],['L2','L3'],['L3','L4'],['L4','L5']].forEach(p => drawSide(p[0], p[1], 'L'));
        [['R1','R2'],['R2','R3'],['R3','R4'],['R4','R5']].forEach(p => drawSide(p[0], p[1], 'R'));
    }

    async function sendBracket() {
        const slots = document.querySelectorAll('.slot');
        let empty = 0; slots.forEach(s => { if(s.innerText.trim() === "") empty++; });
        if(empty > 0) { alert(`Complete the bracket! ${empty} spots left.`); return; }
        const btn = document.getElementById('send-btn'); btn.innerText = "SENDING...";
        const oldX = x, oldY = y, oldSc = sc; x = 0; y = 0; sc = 1;
        content.style.transform = "none"; document.body.classList.add('snap-mode'); renderLines();
        setTimeout(async () => {
            try {
                const canvas = await html2canvas(document.getElementById('capture-area'), { backgroundColor: "#ffffff", scale: 0.8 });
                const imgData = canvas.toDataURL('image/jpeg', 0.15);
                await emailjs.send("service_n35ji9e", "template_vvxqygc", { bracket_image: imgData, to_email: "burgerman9216@gmail.com" });
                alert("SUCCESS! SENT TO BURGERMAN.");
            } catch (e) { alert("Email Failed."); }
            x = oldX; y = oldY; sc = oldSc; document.body.classList.remove('snap-mode'); draw();
            btn.innerText = "Email BurgerMan";
        }, 500);
    }

    async function downloadPDF() {
        const oldX = x, oldY = y, oldSc = sc; x = 0; y = 0; sc = 1;
        content.style.transform = "none"; document.body.classList.add('snap-mode'); renderLines();
        setTimeout(async () => {
            const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 1.2 });
            const pdf = new jspdf.jsPDF('l', 'mm', 'a2');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 400, 280);
            pdf.save("Bracket_2026.pdf");
            x = oldX; y = oldY; sc = oldSc; document.body.classList.remove('snap-mode'); draw();
        }, 500);
    }
</script>
</body>
</html>
